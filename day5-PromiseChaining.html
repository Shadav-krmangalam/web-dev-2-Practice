    <script>

        // ordering food from swiggy

//Promise chaining
        //step 1
        function selectFood(){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{

                    resolve("Food Selected")

                },5000)

            })
        }


        //step 2

        function makePayment(){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                      reject("Payment failed")
                },5000) 

            })
        }


        //step 3
        function orderPlaced(){
            return new Promise((resolve,reject)=>{

                setTimeout(()=>{
                    resolve("Your order has been placed")
                },3000)
            })
        }


        //promise chaining
        selectFood().then((result)=>{
            console.log(result)

            return makePayment();
        }).then((result)=>{

            console.log(result)
            return orderPlaced()

        }).then((result)=>{
            console.log(result)
        }).catch((error)=>{
            console.log(error)
        }).finally(()=>{
            console.log("Kuch bhi hojaye mein to chalunga hiii")
        })
